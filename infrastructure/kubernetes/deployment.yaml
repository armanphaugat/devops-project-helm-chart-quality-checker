apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: helm-checker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: helm-checker-backend:latest
        ports:
        - containerPort: 8080
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
        securityContext:
          runAsUser: 1000
          runAsNonRoot: true
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: linter
  namespace: helm-checker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: linter
  template:
    metadata:
      labels:
        app: linter
    spec:
      containers:
      - name: linter
        image: helm-checker-linter:latest
        ports:
        - containerPort: 8000
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "300m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 20
          periodSeconds: 10
        securityContext:
          runAsUser: 1000