version: '3.8'

services:
  frontend:
    build:
      context: ../../src/main/frontend/helm-frontend
      dockerfile: Dockerfile
    ports:
      - "3001:3000"
    depends_on:
      - backend

  backend:
    build:
      context: ../../src/main/backend
      dockerfile: Dockerfile
    ports:
      - "8081:8080"
    environment:
      - MONGO_URI=mongodb://mongo:27017/helmchecker
      - REDIS_URL=redis://redis:6379
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - LINTER_URL=http://linter:8000
      - JWT_SECRET=helm_checker_secret_2024
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      linter:
        condition: service_started

  linter:
    build:
      context: ../../src/main/linter
      dockerfile: Dockerfile
    ports:
      - "8000:8000"

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
  mongo:
    image: mongo:6
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mongo_data: