name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test-linter:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    - run: pip install -r src/main/linter/requirements.txt
    - run: pytest tests/unit/ -v

  test-backend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - uses: actions/setup-node@v3
      with:
        node-version: '18'
    - run: cd src/main/backend && npm ci && npm test

  build-docker:
    runs-on: ubuntu-latest
    needs: [test-linter, test-backend]
    steps:
    - uses: actions/checkout@v3
    - name: Build all Docker images
      run: |
        docker build -t helm-checker-backend:latest src/main/backend/
        docker build -t helm-checker-linter:latest src/main/linter/

  deploy:
    runs-on: ubuntu-latest
    needs: build-docker
    if: github.ref == 'refs/heads/main'
    steps:
    - uses: actions/checkout@v3
    - name: Deploy with Docker Compose
      run: |
        cd infrastructure/docker
        docker-compose up -d --build