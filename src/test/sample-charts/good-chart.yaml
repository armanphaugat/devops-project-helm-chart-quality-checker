apiVersion: apps/v1
kind: Deployment
metadata:
  name: good-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: good-app
  template:
    spec:
      containers:
      - name: app
        image: nginx:1.25.3
        securityContext:
          runAsUser: 1000
          runAsNonRoot: true
          privileged: false
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "256Mi"
        livenessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 5